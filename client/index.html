<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Update Banner -->
        <div id="updateBanner"></div>
        <!-- Compact Header -->
        <div class="header">
            <div class="header-controls">
                <button id="settingsBtn" class="icon-btn" title="Settings">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"
                            stroke="currentColor" stroke-width="2" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Main Display (click to manually start/stop) -->
        <div class="main-display" id="mainDisplay" title="Click to start/stop tracking">
            <div class="time-row">
                <div class="time-display" id="timeDisplay">00:00:00</div>
                <div class="total-time" id="totalTime" title="Total today"></div>
            </div>
            <div class="project-name" id="projectName">-</div>
        </div>

        <!-- Export Button -->
        <button id="exportBtn" class="export-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span data-i18n="exportBtn">Export</span>
        </button>

        <!-- Settings Panel (hidden by default) -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h2><span data-i18n="settings.title">Settings</span> <span id="versionInfo"
                        class="version-badge"></span></h2>
                <button id="closeSettingsBtn" class="icon-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
            <div class="settings-content">
                <div class="setting-row">
                    <label for="mergeEntries" data-i18n="settings.merge">Merge same day</label>
                    <input type="checkbox" id="mergeEntries">
                </div>
                <div class="setting-row">
                    <label for="autoPause" data-i18n="settings.autoPause">Auto-pause</label>
                    <input type="checkbox" id="autoPause" checked>
                </div>
                <div class="setting-row">
                    <label for="idleTimeout" data-i18n="settings.idleTimeout">Timeout (min)</label>
                    <input type="number" id="idleTimeout" min="1" max="120" value="30">
                </div>
                <div class="setting-row">
                    <label for="languageSelect" data-i18n="settings.language">Language</label>
                    <select id="languageSelect">
                        <option value="de">Deutsch</option>
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                        <option value="it">Italiano</option>
                        <option value="pt-BR">Português (Brasil)</option>
                        <option value="ru">Русский</option>
                        <option value="ja">日本語</option>
                        <option value="zh-CN">简体中文</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label for="showLogs" data-i18n="settings.debugLogs">Debug Logs</label>
                    <input type="checkbox" id="showLogs">
                </div>

                <!-- CSV Columns Configuration -->
                <div class="csv-config-section">
                    <div class="csv-config-header" id="csvConfigToggle">
                        <span>📊 CSV Columns</span>
                        <span class="toggle-arrow">▼</span>
                    </div>
                    <div class="csv-config-content" id="csvConfigContent">
                        <div class="csv-config-actions">
                            <button id="importCsvConfigBtn" class="csv-config-btn" data-i18n="settings.importCsvConfig">Import Config</button>
                            <button id="exportCsvConfigBtn" class="csv-config-btn" data-i18n="settings.exportCsvConfig">Export Config</button>
                        </div>
                        <div class="csv-preset-row">
                            <input type="text" id="csvPresetNameInput" class="csv-preset-input" data-i18n-placeholder="settings.csvPresetPlaceholder" placeholder="Preset name">
                            <button id="saveCsvPresetBtn" class="csv-config-btn csv-preset-save-btn" data-i18n="settings.saveCsvPreset">Save Preset</button>
                        </div>
                        <select id="csvPresetSelect" class="csv-preset-select"></select>
                        <input type="file" id="csvConfigFileInput" accept=".json" class="csv-config-file-input">
                        <div id="csvColumnsContainer"></div>
                    </div>
                </div>

                <div class="setting-row">
                    <button id="clearDataBtn" class="danger-btn" data-i18n="settings.clearData">Clear Data</button>
                </div>
            </div>
        </div>

        <!-- Debug Log Panel -->
        <div class="log-panel" id="logPanel">
            <div class="log-header">
                <span data-i18n="logs.title">📋 Debug Logs</span>
                <div>
                    <button id="copyLogsBtn" class="icon-btn" title="Copy logs" data-i18n-title="logs.copyTitle">📋</button>
                    <button id="clearLogsBtn" class="icon-btn" title="Clear logs" data-i18n-title="logs.clearTitle">🗑️</button>
                </div>
            </div>
            <div class="log-content" id="logContent"></div>
        </div>

        <!-- Idle Alert -->
        <div class="idle-alert" id="idleAlert">
            <span data-i18n="idleWarning">Project not tracked!</span>
            <button id="dismissIdleBtn" class="icon-btn">✕</button>
        </div>
    </div>

    <script src="CSInterface.js"></script>
    <script src="main.js"></script>
</body>

</html>
